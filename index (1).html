<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0f1e" />
  <title>JobConnect – Download</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0f1e;
      --surface:   #111827;
      --card:      #151d2e;
      --border:    rgba(255,255,255,0.06);
      --accent:    #2dd4bf;
      --accent2:   #3b82f6;
      --text:      #f0f4ff;
      --muted:     #8b9ab5;
      --glow:      rgba(45,212,191,0.18);
      --glow2:     rgba(59,130,246,0.14);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Background ── */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% -10%, var(--glow2) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 110%, var(--glow) 0%, transparent 60%),
        var(--bg);
    }

    .grid-overlay {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 20%, transparent 80%);
    }

    /* ── Layout ── */
    .wrapper {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1.25rem;
      gap: 0;
    }

    /* ── Card ── */
    .card {
      width: 100%; max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 2.75rem 2.25rem 2.5rem;
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 32px 80px rgba(0,0,0,.55),
        0 0 60px var(--glow2);
      animation: rise .7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes rise {
      from { opacity:0; transform: translateY(28px) scale(.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* ── Icon ── */
    .app-icon {
      width: 96px; height: 96px;
      border-radius: 26px;
      background: linear-gradient(140deg, #1a3a5c 0%, #0f2740 50%, #0d1f35 100%);
      border: 1px solid rgba(59,130,246,.35);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.75rem;
      position: relative;
      box-shadow:
        0 0 0 6px rgba(59,130,246,.06),
        0 12px 40px rgba(0,0,0,.5);
      animation: icon-pop .6s .15s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes icon-pop {
      from { opacity:0; transform: scale(.7); }
      to   { opacity:1; transform: scale(1); }
    }

    .app-icon svg { width: 52px; height: 52px; }

    /* Pulse ring */
    .app-icon::after {
      content: '';
      position: absolute; inset: -10px;
      border-radius: 36px;
      border: 2px solid var(--accent2);
      opacity: 0;
      animation: pulse-ring 2.4s 1.2s ease-out infinite;
    }

    @keyframes pulse-ring {
      0%   { inset: -6px; opacity: .5; }
      100% { inset: -22px; opacity: 0; }
    }

    /* ── Typography ── */
    .app-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.9rem, 6vw, 2.35rem);
      letter-spacing: -.02em;
      line-height: 1;
      background: linear-gradient(120deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .35rem;
      animation: fade-up .5s .25s both;
    }

    .tagline {
      font-size: .83rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 1.6rem;
      opacity: .85;
      animation: fade-up .5s .32s both;
    }

    @keyframes fade-up {
      from { opacity:0; transform: translateY(10px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── Divider ── */
    .divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), var(--border), transparent);
      margin-bottom: 1.6rem;
      animation: fade-up .5s .35s both;
    }

    /* ── Status pill ── */
    .status {
      display: flex; align-items: center; gap: .6rem;
      background: rgba(45,212,191,.08);
      border: 1px solid rgba(45,212,191,.18);
      border-radius: 100px;
      padding: .45rem 1.1rem;
      margin-bottom: 1.5rem;
      animation: fade-up .5s .42s both;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity:1; } 50% { opacity:.25; }
    }

    .status-text {
      font-size: .82rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: .03em;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      width: 100%; height: 4px;
      background: rgba(255,255,255,.06);
      border-radius: 100px;
      overflow: hidden;
      margin-bottom: 1.75rem;
      animation: fade-up .5s .48s both;
    }

    .progress-bar {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      animation: progress-fill 2.2s .6s cubic-bezier(.4,0,.2,1) forwards;
      width: 0;
    }

    @keyframes progress-fill {
      0%   { width: 0%; }
      30%  { width: 45%; }
      70%  { width: 78%; }
      100% { width: 100%; }
    }

    /* ── Message ── */
    .message {
      font-size: 1rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.55;
      margin-bottom: .6rem;
      animation: fade-up .5s .5s both;
    }

    .note {
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: 2rem;
      animation: fade-up .5s .55s both;
    }

    /* ── Button ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: .6rem;
      width: 100%;
      padding: .95rem 1.5rem;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: .01em;
      text-decoration: none;
      transition: transform .18s, box-shadow .18s, filter .18s;
      animation: fade-up .5s .62s both;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent2) 0%, #1d4ed8 100%);
      color: #fff;
      box-shadow: 0 4px 24px rgba(59,130,246,.35), 0 0 0 1px rgba(255,255,255,.06) inset;
    }

    .btn-primary:hover  { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(59,130,246,.5); }
    .btn-primary:active { transform: translateY(0); filter: brightness(.92); }

    .btn svg { flex-shrink: 0; }

    /* ── Footer badges ── */
    .badges {
      display: flex; gap: 1.25rem;
      justify-content: center;
      margin-top: 1.6rem;
      animation: fade-up .5s .7s both;
    }

    .badge {
      display: flex; align-items: center; gap: .38rem;
      font-size: .73rem;
      color: var(--muted);
      letter-spacing: .02em;
    }

    .badge svg { opacity: .6; }

    /* ── Footer ── */
    footer {
      margin-top: 2.25rem;
      font-size: .72rem;
      color: rgba(139,154,181,.45);
      letter-spacing: .04em;
      text-align: center;
      animation: fade-up .5s .75s both;
    }
  </style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="grid-overlay"></div>

<div class="wrapper">
  <div class="card">

    <!-- App Icon -->
    <div class="app-icon" aria-hidden="true">
      <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Briefcase shape -->
        <rect x="7" y="18" width="38" height="26" rx="5" fill="url(#g1)" opacity=".95"/>
        <path d="M18 18v-4a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v4" stroke="url(#g2)" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M7 30h38" stroke="rgba(255,255,255,.15)" stroke-width="1.5"/>
        <!-- Tie / center clasp -->
        <rect x="22" y="26" width="8" height="8" rx="2" fill="url(#g3)"/>
        <defs>
          <linearGradient id="g1" x1="7" y1="18" x2="45" y2="44" gradientUnits="userSpaceOnUse">
            <stop stop-color="#3b82f6"/>
            <stop offset="1" stop-color="#2dd4bf"/>
          </linearGradient>
          <linearGradient id="g2" x1="18" y1="10" x2="34" y2="18" gradientUnits="userSpaceOnUse">
            <stop stop-color="#7dd3fc"/>
            <stop offset="1" stop-color="#2dd4bf"/>
          </linearGradient>
          <linearGradient id="g3" x1="22" y1="26" x2="30" y2="34" gradientUnits="userSpaceOnUse">
            <stop stop-color="#fff" stop-opacity=".9"/>
            <stop offset="1" stop-color="#7dd3fc" stop-opacity=".7"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- Name + Tagline -->
    <h1 class="app-name">JobConnect</h1>
    <p class="tagline">Find your next opportunity</p>

    <div class="divider"></div>

    <!-- Status -->
    <div class="status">
      <span class="dot"></span>
      <span class="status-text">Preparing your download…</span>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

    <!-- Message -->
    <p class="message">Your download will start automatically</p>
    <p class="note">If it doesn't start, click the button below</p>

    <!-- Manual button -->
    <a class="btn btn-primary" href="https://github.com/benyaminemilan-art/jobconnect-downlaod-1/releases/download/v1.0.1/app-release.apk" download="JobConnect.apk" id="dl-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download Manually
    </a>

    <!-- Trust badges -->
    <div class="badges">
      <span class="badge">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Verified &amp; Safe
      </span>
      <span class="badge">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Fast Install
      </span>
      <span class="badge">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        Android APK
      </span>
    </div>

  </div>

  <footer>© 2025 JobConnect · v1.0.0 · All rights reserved</footer>
</div>

<script>
  (function () {
    var APK_URL = "https://github.com/benyaminemilan-art/jobconnect-downlaod-1/releases/download/v1.0.1/app-release.apk";

    // Wait for progress animation to feel "ready", then trigger auto-download
    var delay = 2600; // ms – matches the progress bar animation

    function triggerDownload() {
      try {
        var a = document.createElement("a");
        a.href = APK_URL;
        a.download = "JobConnect.apk";
        a.style.display = "none";
        document.body.appendChild(a);
        a.click();
        setTimeout(function () { document.body.removeChild(a); }, 1000);

        // Update status text after trigger
        var statusEl = document.querySelector(".status-text");
        var dotEl    = document.querySelector(".dot");
        if (statusEl) statusEl.textContent = "Download started!";
        if (dotEl)    dotEl.style.background = "#2dd4bf";
      } catch (e) {
        console.warn("Auto-download failed:", e);
      }
    }

    setTimeout(triggerDownload, delay);
  })();
</script>

</body>
</html>
